name: AI Daily News

on:
  schedule:
    # UTC 时间，北京时间 = UTC+8
    # 每天北京时间 8:00 (UTC 0:00) 和 18:00 (UTC 10:00)
    - cron: '0 0 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news aggregator
        env:
          SUMMARIZER_PROVIDER: ${{ secrets.SUMMARIZER_PROVIDER }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          PUSH_ENABLED: ${{ secrets.PUSH_ENABLED }}
          WPS_WEBHOOK_URL: ${{ secrets.WPS_WEBHOOK_URL }}
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          LARK_SECRET: ${{ secrets.LARK_SECRET }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save database
        uses: actions/upload-artifact@v4
        with:
          name: news-db-${{ github.run_number }}
          path: data/news.db
          retention-days: 30
